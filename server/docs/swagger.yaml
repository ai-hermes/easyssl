definitions:
  model.Access:
    properties:
      config:
        additionalProperties: true
        type: object
      createdAt:
        type: string
      deleted:
        type: string
      id:
        type: string
      name:
        type: string
      ownerUserId:
        type: string
      provider:
        type: string
      reserve:
        type: string
      updatedAt:
        type: string
    type: object
  model.ChangePasswordRequest:
    properties:
      password:
        minLength: 8
        type: string
    required:
    - password
    type: object
  model.CreateAPIKeyRequest:
    properties:
      expiresAt:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  model.DownloadCertificateRequest:
    properties:
      format:
        type: string
    type: object
  model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  model.OpenApplyCertificateRequest:
    properties:
      accessId:
        type: string
      caProvider:
        type: string
      contactEmail:
        type: string
      dnsPropagationTimeout:
        type: integer
      dnsTTL:
        type: integer
      domains:
        items:
          type: string
        type: array
      keyAlgorithm:
        type: string
      provider:
        type: string
    type: object
  model.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  model.StartWorkflowRunRequest:
    properties:
      trigger:
        type: string
    type: object
  model.TestNotificationRequest:
    properties:
      accessId:
        type: string
      provider:
        type: string
    type: object
  model.Workflow:
    properties:
      createdAt:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      graphContent:
        additionalProperties: true
        type: object
      graphDraft:
        additionalProperties: true
        type: object
      hasContent:
        type: boolean
      hasDraft:
        type: boolean
      id:
        type: string
      lastRunId:
        type: string
      lastRunStatus:
        type: string
      lastRunTime:
        type: string
      name:
        type: string
      ownerUserId:
        type: string
      trigger:
        type: string
      triggerCron:
        type: string
      updatedAt:
        type: string
    type: object
  util.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
info:
  contact: {}
  description: |-
    EasySSL service APIs.
    1) Call POST /api/auth/login to get JWT token.
    2) Call POST /api/auth/api-keys to generate API key token (shown once).
    3) Call OpenAPI certificate apply endpoints with `X-API-Key: <token>`.
    4) Other business APIs support `Authorization: Bearer <token>` or `X-API-Key: <token>`.
  title: EasySSL API
  version: "1.0"
paths:
  /api/accesses:
    get:
      description: List all access credentials configured by the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List accesses
      tags:
      - Access
    post:
      consumes:
      - application/json
      description: Create a new access credential or update an existing one.
      parameters:
      - description: access
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Access'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Create or update access
      tags:
      - Access
  /api/accesses/{id}:
    delete:
      description: Soft delete an access credential.
      parameters:
      - description: Access id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Delete access
      tags:
      - Access
    put:
      consumes:
      - application/json
      description: Create a new access credential or update an existing one.
      parameters:
      - description: Access id
        in: path
        name: id
        type: string
      - description: access
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Access'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Create or update access
      tags:
      - Access
  /api/accesses/{id}/test:
    post:
      description: Test the connectivity and validity of an access credential.
      parameters:
      - description: Access id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Test access
      tags:
      - Access
  /api/admin/users:
    get:
      description: List all registered users. Requires admin role.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List all users (admin only)
      tags:
      - User
  /api/admin/users/{id}/status:
    put:
      consumes:
      - application/json
      description: Enable or disable a user account. Requires admin role.
      parameters:
      - description: User id
        in: path
        name: id
        required: true
        type: string
      - description: '{status}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Update user status (admin only)
      tags:
      - User
  /api/auth/api-keys:
    get:
      description: List all API keys created by the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List API keys
      tags:
      - APIKey
    post:
      consumes:
      - application/json
      description: Create a new API key for programmatic access via X-API-Key header.
      parameters:
      - description: name/expiresAt
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Create API key
      tags:
      - APIKey
  /api/auth/api-keys/{id}:
    delete:
      description: Revoke an existing API key to disable its access.
      parameters:
      - description: API key id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Revoke API key
      tags:
      - APIKey
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password to obtain a JWT token.
      parameters:
      - description: email/password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      summary: User login
      tags:
      - Auth
  /api/auth/me:
    get:
      description: Get the current authenticated user's profile information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Current user
      tags:
      - Auth
  /api/auth/password:
    put:
      consumes:
      - application/json
      description: Update the password for the current user. Takes effect on next
        login.
      parameters:
      - description: new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Change user password
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account with email and password.
      parameters:
      - description: email/password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      summary: User registration
      tags:
      - Auth
  /api/certificates:
    get:
      description: List all certificates managed by the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List certificates
      tags:
      - Certificate
  /api/certificates/{id}/download:
    post:
      consumes:
      - application/json
      description: Download a certificate in the specified format (PEM, PFX, JKS).
      parameters:
      - description: Certificate id
        in: path
        name: id
        required: true
        type: string
      - description: format
        in: body
        name: body
        schema:
          $ref: '#/definitions/model.DownloadCertificateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Download certificate
      tags:
      - Certificate
  /api/certificates/{id}/revoke:
    post:
      description: Revoke a certificate to mark it as invalid.
      parameters:
      - description: Certificate id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Revoke certificate
      tags:
      - Certificate
  /api/notifications/test:
    post:
      consumes:
      - application/json
      description: Send a test notification using the specified provider and access.
      parameters:
      - description: provider/accessId
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.TestNotificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Test notification
      tags:
      - Notification
  /api/providers:
    get:
      description: List all available provider definitions for DNS, access, and deploy
        operations.
      parameters:
      - description: 'provider kind: access, dns, deploy'
        in: query
        name: kind
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List provider definitions
      tags:
      - Providers
  /api/statistics:
    get:
      description: Get dashboard statistics including certificate and workflow counts.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Dashboard statistics
      tags:
      - Statistics
  /api/workflows:
    get:
      description: List all workflows owned by the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List workflows
      tags:
      - Workflow
    post:
      consumes:
      - application/json
      description: Create a new workflow or update an existing workflow definition.
      parameters:
      - description: workflow
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Workflow'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Create or update workflow
      tags:
      - Workflow
  /api/workflows/{id}:
    delete:
      description: Delete a workflow and all its associated data.
      parameters:
      - description: Workflow id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Delete workflow
      tags:
      - Workflow
    get:
      description: Get detailed information of a specific workflow.
      parameters:
      - description: Workflow id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Get workflow
      tags:
      - Workflow
    put:
      consumes:
      - application/json
      description: Create a new workflow or update an existing workflow definition.
      parameters:
      - description: Workflow id
        in: path
        name: id
        type: string
      - description: workflow
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Workflow'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Create or update workflow
      tags:
      - Workflow
  /api/workflows/{id}/runs:
    get:
      description: List execution runs for a specific workflow.
      parameters:
      - description: Workflow id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List workflow runs
      tags:
      - Workflow
    post:
      consumes:
      - application/json
      description: Manually trigger a workflow execution.
      parameters:
      - description: Workflow id
        in: path
        name: id
        required: true
        type: string
      - description: trigger
        in: body
        name: body
        schema:
          $ref: '#/definitions/model.StartWorkflowRunRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Start workflow run
      tags:
      - Workflow
  /api/workflows/{id}/runs/{runId}/cancel:
    post:
      description: Cancel a running or pending workflow execution.
      parameters:
      - description: Workflow id
        in: path
        name: id
        required: true
        type: string
      - description: Run id
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Cancel workflow run
      tags:
      - Workflow
  /api/workflows/{id}/runs/{runId}/events:
    get:
      description: List event logs for a workflow run, optionally filtered by node.
      parameters:
      - description: Workflow id
        in: path
        name: id
        required: true
        type: string
      - description: Run id
        in: path
        name: runId
        required: true
        type: string
      - description: Node id
        in: query
        name: nodeId
        type: string
      - description: RFC3339 timestamp
        in: query
        name: since
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List workflow run events
      tags:
      - Workflow
  /api/workflows/{id}/runs/{runId}/nodes:
    get:
      description: List all node execution records for a workflow run.
      parameters:
      - description: Workflow id
        in: path
        name: id
        required: true
        type: string
      - description: Run id
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List workflow run nodes
      tags:
      - Workflow
  /api/workflows/stats:
    get:
      description: Get real-time workflow dispatcher statistics including concurrency
        and queue status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Workflow dispatcher stats
      tags:
      - Workflow
  /openapi/certificates/apply:
    post:
      consumes:
      - application/json
      description: Apply for an SSL certificate using the OpenAPI endpoint with API
        key authentication.
      parameters:
      - description: certificate apply request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.OpenApplyCertificateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - ApiKeyAuth: []
      summary: Apply certificate via OpenAPI
      tags:
      - OpenAPI
  /openapi/certificates/runs/{runId}:
    get:
      description: Get the status and result of a certificate apply run triggered
        via OpenAPI.
      parameters:
      - description: Run id
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - ApiKeyAuth: []
      summary: Get OpenAPI certificate apply run
      tags:
      - OpenAPI
  /openapi/certificates/runs/{runId}/events:
    get:
      description: List execution events for a certificate apply run.
      parameters:
      - description: Run id
        in: path
        name: runId
        required: true
        type: string
      - description: Node id
        in: query
        name: nodeId
        type: string
      - description: RFC3339 timestamp
        in: query
        name: since
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.Response'
      security:
      - ApiKeyAuth: []
      summary: List OpenAPI certificate apply run events
      tags:
      - OpenAPI
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-Key
    type: apiKey
  BearerAuth:
    description: 'Use format: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
