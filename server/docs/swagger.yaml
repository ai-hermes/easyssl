basePath: /api
definitions:
  model.OpenApplyCertificateRequest:
    properties:
      accessId:
        type: string
      caProvider:
        type: string
      contactEmail:
        type: string
      dnsPropagationTimeout:
        type: integer
      dnsTTL:
        type: integer
      domains:
        items:
          type: string
        type: array
      keyAlgorithm:
        type: string
      provider:
        type: string
    type: object
  util.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
info:
  contact: {}
  description: |-
    EasySSL service APIs.
    1) Call POST /api/auth/login to get JWT token.
    2) Call POST /api/auth/api-keys to generate API key token (shown once).
    3) Call OpenAPI certificate apply endpoints with `X-API-Key: <token>`.
    4) Other business APIs support `Authorization: Bearer <token>` or `X-API-Key: <token>`.
  title: EasySSL API
  version: "1.0"
