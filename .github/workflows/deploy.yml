name: Deploy to Tencent Cloud

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0). Leave empty to use git SHA.'
        required: false
        default: ''

env:
  REGISTRY: ccr.ccs.tencentyun.com
  NAMESPACE: ai-hermes
  IMAGE_NAME: easyssl

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent Cloud CCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Decode SSH key
        id: ssh-key
        run: |
          {
            echo 'key<<EOF'
            echo '${{ secrets.TENCENT_CLOUD_SSH_KEY }}' | base64 -d
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TENCENT_CLOUD_HOST }}
          username: ${{ secrets.TENCENT_CLOUD_USER }}
          key: ${{ steps.ssh-key.outputs.key }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_DIR="/home/tiger/deploy/easyssl"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -f .env ]; then
              echo ".env file not found at $APP_DIR/.env"
              exit 1
            fi

            if [ ! -f docker-compose.yml ]; then
              cat > docker-compose.yml << 'YAML'
            services:
              api:
                image: ${EASYSSL_IMAGE}
                container_name: easyssl-api
                restart: always
                env_file:
                  - .env
                environment:
                  LISTEN_ADDR: :8090
                  PG_HOST: db
                  PG_PORT: 5432
                ports:
                  - "8090:8090"
                depends_on:
                  db:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/healthz"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 15s

              db:
                image: postgres:16
                container_name: easyssl-db
                restart: always
                env_file:
                  - .env
                environment:
                  POSTGRES_DB: ${PG_DATABASE:-easyssl}
                  POSTGRES_USER: ${PG_USER:-postgres}
                  POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
                volumes:
                  - pgdata:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

            volumes:
              pgdata:
                name: easyssl-pgdata
            YAML
            fi

            EASYSSL_IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.tag }}"
            sed -i '/^version:/d' docker-compose.yml
            LINE=$(grep -n "image:" docker-compose.yml | head -1 | cut -d: -f1)
            sed -i "${LINE}s|image: .*|image: $EASYSSL_IMAGE|" docker-compose.yml

            trap 'docker logout >/dev/null 2>&1 || true' EXIT

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "Docker Compose not found"
              exit 1
            fi

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            for attempt in 1 2 3; do
              if $COMPOSE pull api; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Image pull failed after 3 attempts"
                exit 1
              fi
              sleep 15
            done

            $COMPOSE up -d

            for i in $(seq 1 30); do
              if curl -sf http://localhost:8090/healthz > /dev/null 2>&1; then
                exit 0
              fi
              sleep 2
            done

            echo "API health check failed"
            exit 1
