version: "3.9"
services:
  db:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PG_DATABASE:-easyssl}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    image: golang:1.22
    working_dir: /app/server
    command: bash -lc "go mod tidy && go run ./cmd/migrate && go run ./cmd/api"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      LISTEN_ADDR: ${LISTEN_ADDR:-:8090}
      JWT_SECRET: ${JWT_SECRET:-easyssl-dev-secret}
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      PG_DATABASE: ${PG_DATABASE:-easyssl}
      PG_SSLMODE: ${PG_SSLMODE:-disable}
    ports:
      - "${API_PORT:-8090}:8090"
    depends_on:
      - db
volumes:
  pgdata:
