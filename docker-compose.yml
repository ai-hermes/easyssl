version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: easyssl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    image: golang:1.22
    working_dir: /app/server
    command: bash -lc "go mod tidy && go run ./cmd/migrate && go run ./cmd/api"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/easyssl?sslmode=disable
      LISTEN_ADDR: :8090
      JWT_SECRET: easyssl-dev-secret
    ports:
      - "8090:8090"
    depends_on:
      - db
volumes:
  pgdata:
