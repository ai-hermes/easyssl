version: "3.9"
services:
  db:
    image: ${REGISTRY:-docker.io}/postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PG_DATABASE:-easyssl}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    image: ${REGISTRY:-docker.io}/easyssl-api:dev
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        REGISTRY: ${REGISTRY:-docker.io}
    env_file:
      - .env
    environment:
      LISTEN_ADDR: ${LISTEN_ADDR:-:8090}
      JWT_SECRET: ${JWT_SECRET:-easyssl-dev-secret}
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      PG_DATABASE: ${PG_DATABASE:-easyssl}
      PG_SSLMODE: ${PG_SSLMODE:-disable}
    ports:
      - "${API_PORT:-8090}:8090"
    depends_on:
      - db
volumes:
  pgdata:
