version: "3.9"

# Production Docker Compose for EasySSL.
# Place a .env file next to this compose file on the server before first deploy.

services:
  api:
    image: ${EASYSSL_IMAGE}
    container_name: easyssl-api
    restart: always
    env_file:
      - .env
    environment:
      LISTEN_ADDR: :8090
      PG_HOST: db
      PG_PORT: 5432
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    image: postgres:16
    container_name: easyssl-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PG_DATABASE:-easyssl}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: easyssl-pgdata
